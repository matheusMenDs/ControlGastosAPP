<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculadora de Gastos Mensais</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/coin.png">
</head>

<body>
    <script>
        if (localStorage.getItem("logado") !== "1") {
            window.location.href = "login.html";
        }
    </script>

    <div class="app">
        <header class="header">
            <div class="brand">
                <div class="logo">
                    <img src="img/coin.png" alt="Coin" class="logo-coin" draggable="false" />
                </div>
                <h1 class="bungee-spice-regular">
                    Gastos Mensais
                    <img src="img/ratoMine.png" alt="Rato Mine" class="ratomine" />
                </h1>
            </div>

            <div class="actions">
                <button id="btnNew" class="btn primary" title="Novo gasto (N)">+ Novo</button>
                <button onclick="toggleFullScreen()" class="btn fullscreen-btn" title="Alternar tela cheia (F11)">⤢</button>
                <button onclick="sair()" class="btn danger">Sair</button>
            </div>
        </header>

        <section class="summary">
            <!-- Gasto Total à esquerda -->
            <div class="summary-card-r">
                <span class="label">GASTO TOTAL</span>
                <span id="totalMonth" class="value">R$ 0,00</span>
            </div>

            <div class="summary-card">
                <span class="label">ITENS</span>
                <span id="itemsCount" class="value">0</span>
            </div>

            <!-- Cofre (direita) -->
            <div class="summary-card-g">
                <span class="label">COFRE</span>
                <span id="profit" class="value">R$ 0,00</span>
            </div>
        </section>

        <section class="filters">
            <div class="filter-row">
                <div class="field">
                    <label>Mês</label>
                    <input type="month" id="filterMonth" />
                </div>
                <div class="field">
                    <label>Categoria</label>
                    <select id="filterCategory">
                        <option value="">Todas</option>
                        <option>Weed</option>
                        <option>Gasolina</option>
                        <option>Faturas</option>
                        <option>Lazer</option>
                        <option>Cofre</option>
                        <option>Outros</option>
                    </select>
                </div>
                <div class="field">
                    <label>Ordenar por</label>
                    <button id="sortToggle" class="sort-toggle">Filtar por Data</button>
                </div>
                <div class="field grow">
                    <label>Buscar</label>
                    <input type="search" id="searchInput" placeholder="Descrição ou nome..." />
                </div>
            </div>
        </section>

        <section class="content">
            <div class="left">
                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrição</th>
                                <th>Categoria</th>
                                <th class="right">Valor</th>
                                <th class="center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Linhas geradas via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="right">
                <div class="chart-wrapper">
                    <canvas id="chartBar" height="220"></canvas>
                </div>
                <div class="legend">
                    <div class="legend-cols">
                        <div class="legend-item legend-weed" data-category="Weed"><span class="color weed"></span>Weed</div>
                        <div class="legend-item legend-gasolina" data-category="Gasolina"><span class="color gasolina"></span>Gasolina</div>
                        <div class="legend-item legend-faturas" data-category="Faturas"><span class="color faturas"></span>Faturas</div>
                        <div class="legend-item legend-lazer" data-category="Lazer"><span class="color lazer"></span>Lazer</div>
                        <div class="legend-item legend-outros" data-category="Outros"><span class="color outros"></span>Outros</div>
                        <div class="legend-item legend-cofre" data-category="Cofre"><span class="color cofre"></span>Cofre</div>
                    </div>
                    <button id="resetHighlight" class="btn reset-highlight" title="Resetar cores das descrições">✕</button>
                </div>
                <div class="hint hint-anotacoes">
                    <div class="hint-header">
                        <div class="hint-title">ANOTAÇÕES</div>
                        <button id="clearNotes" class="btn reset-highlight" title="Limpar anotações">✕</button>
                    </div>
                    <textarea id="notesArea" class="notes-textarea"></textarea>
                </div>
                <div class="hint hint-atalhos">
                    <div class="hint-title">ATALHOS</div>
                    <ul>
                        <br>
                        <li> N 🠖 NOVO</li>
                        <li> / 🠖 BUSCAR</li>
                        <li> ENTER 🠖 CONFIRMAR</li>
                        <li> ESC 🠖 TELA CHEIA</li>
                    </ul>
                </div>
            </div>
        </section>
<br>
        <footer class="footer">
            <span> &copy;  2025 Matheus Mendes de Oliveira  &copy;</span>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-dialog">
            <header class="modal-header">
                <h2 id="modalTitle">Novo gasto</h2>
                <button id="modalClose" class="icon-btn" title="Fechar">✕</button>
            </header>
            <div class="modal-body">
                <form id="expenseForm">
                    <div class="form-row">
                        <div class="field">
                            <label>Data</label>
                            <input type="date" id="dateInput" required />
                        </div>
                        <div class="field grow">
                            <label>Descrição</label>
                            <input type="text" id="descInput" placeholder="Ex: Gasolina" required />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="field">
                            <label>Categoria</label>
                            <select id="catInput" required>
                                <option>Weed</option>
                                <option>Gasolina</option>
                                <option>Faturas</option>
                                <option>Lazer</option>
                                <option>Outros</option>
                                <option>Cofre</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Valor (R$)</label>
                            <input type="number" id="valueInput" step="0.01" min="0" placeholder="0,00" required />
                        </div>
                    </div>

                    <div class="field">
                        <label>Nota (opcional)</label>
                        <textarea id="noteInput" rows="2" placeholder="Detalhes, forma de pagamento..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btnSave" class="btn primary">Salvar</button>
                        <button type="button" id="btnCancel" class="btn">Cancelar</button>
                    </div>
                    <input type="hidden" id="editingId" />
                </form>
            </div>
        </div>
    </div>

    <!-- Confirm modal custom (para limpar e exclusões) -->
    <div id="confirmModal" aria-hidden="true">
        <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <div id="confirmTitle" style="font-weight:700; margin-bottom:8px;">CONFIRMAÇÃO</div>
            <div class="confirm-msg" id="confirmMsg">Mensagem</div>
            <div class="confirm-actions">
                <button class="btn cancel" id="confirmCancel">Cancelar</button>
                <button class="btn ok" id="confirmOk">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>

</html>
